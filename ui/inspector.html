<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Amaran Lights</title>
    <style>
      :root { color-scheme: dark; }
      body {
        font-family: -apple-system, "Segoe UI", sans-serif;
        font-size: 12px;
        color: #d8d8d8;
        background: #2d2d2d;
        margin: 0;
        padding: 12px;
      }
      .row { display: flex; align-items: center; margin-bottom: 10px; gap: 8px; }
      .row label { flex: 0 0 90px; text-align: right; color: #969696; }
      .row .control { flex: 1; display: flex; gap: 6px; }
      input, select, button {
        background: #3d3d3d; color: #d8d8d8; border: 1px solid #555;
        border-radius: 4px; padding: 5px 6px; font-size: 12px; width: 100%;
      }
      input[type="color"] { padding: 2px; height: 28px; }
      button { width: auto; cursor: pointer; white-space: nowrap; }
      button:hover { background: #4a4a4a; }
      .hint { color: #7a7a7a; margin: -4px 0 10px 98px; font-size: 11px; }
      .status { margin-left: 98px; font-size: 11px; min-height: 14px; }
      .status.ok { color: #6fcf6f; }
      .status.err { color: #e06c6c; }
    </style>
  </head>
  <body>
    <div class="row">
      <label for="light">Light</label>
      <div class="control">
        <select id="light"></select>
        <button id="refresh" type="button">↻</button>
      </div>
    </div>
    <div class="status" id="status"></div>

    <!-- toggle only -->
    <div class="row" data-only="com.coachjamesgunaca.amaran-openapi.toggle">
      <label for="mode">Action</label>
      <div class="control">
        <select id="mode">
          <option value="toggle">Toggle</option>
          <option value="on">Turn On</option>
          <option value="off">Turn Off</option>
        </select>
      </div>
    </div>

    <!-- color only -->
    <div class="row" data-only="com.coachjamesgunaca.amaran-openapi.color">
      <label for="color">Color</label>
      <div class="control"><input id="color" type="color" /></div>
    </div>
    <div class="row" data-only="com.coachjamesgunaca.amaran-openapi.color">
      <label for="levelColor">Brightness (%)</label>
      <div class="control"><input id="levelColor" type="number" min="1" max="100" step="1" /></div>
    </div>

    <!-- brightness step only -->
    <div class="row" data-only="com.coachjamesgunaca.amaran-openapi.brightness-step">
      <label for="step">Step (%)</label>
      <div class="control"><input id="step" type="number" min="-100" max="100" step="1" /></div>
    </div>

    <!-- brightness dial only -->
    <div class="row" data-only="com.coachjamesgunaca.amaran-openapi.brightness-dial">
      <label for="perTickB">Per tick (%)</label>
      <div class="control"><input id="perTickB" type="number" min="1" max="50" step="1" /></div>
    </div>

    <!-- cct dial only -->
    <div class="row" data-only="com.coachjamesgunaca.amaran-openapi.cct-dial">
      <label for="perTickC">Per tick (K)</label>
      <div class="control"><input id="perTickC" type="number" min="10" max="1000" step="10" /></div>
    </div>
    <div class="row" data-only="com.coachjamesgunaca.amaran-openapi.cct-dial">
      <label for="levelCct">Brightness (%)</label>
      <div class="control"><input id="levelCct" type="number" min="1" max="100" step="1" /></div>
    </div>
    <div class="hint" data-only="com.coachjamesgunaca.amaran-openapi.cct-dial">Used only if a Brightness key/dial hasn't set this light's level yet.</div>

    <div class="row">
      <label for="baseUrl">Server</label>
      <div class="control"><input id="baseUrl" type="text" placeholder="http://127.0.0.1:2709" /></div>
    </div>
    <div class="row">
      <label for="token">Token</label>
      <div class="control"><input id="token" type="text" placeholder="(optional)" /></div>
    </div>
    <div class="hint">Point Server at the Homebridge control server (<code>:2709</code>) for HomeKit sync, or the daemon (<code>:2708</code>) for direct control.</div>

    <script>
      let websocket = null;
      let uuid = null;
      let actionUUID = null;
      let settings = {};

      const DEFAULT_BASE_URL = "http://127.0.0.1:2709";
      const $ = (id) => document.getElementById(id);

      function setStatus(msg, ok) {
        const el = $("status");
        el.textContent = msg || "";
        el.className = "status " + (ok === undefined ? "" : ok ? "ok" : "err");
      }

      function baseUrl() {
        return ($("baseUrl").value || "").trim().replace(/\/+$/, "") || DEFAULT_BASE_URL;
      }

      function authHeaders() {
        const h = {};
        const t = ($("token").value || "").trim();
        if (t) h["Authorization"] = "Bearer " + t;
        return h;
      }

      function saveSettings() {
        if (!websocket || websocket.readyState !== 1) return;
        websocket.send(
          JSON.stringify({ event: "setSettings", context: uuid, payload: settings }),
        );
      }

      async function loadLights() {
        setStatus("Loading lights…");
        try {
          const res = await fetch(baseUrl() + "/lights", { headers: authHeaders() });
          if (!res.ok) throw new Error("HTTP " + res.status);
          const data = await res.json();
          const lights = data.lights || [];
          const sel = $("light");
          sel.innerHTML = "";
          const all = document.createElement("option");
          all.value = "all";
          all.textContent = "All lights";
          sel.appendChild(all);
          for (const l of lights) {
            const opt = document.createElement("option");
            opt.value = l.key;
            opt.textContent = l.name || l.key;
            sel.appendChild(opt);
          }
          sel.value = settings.lightId || "all";
          setStatus(lights.length + " light(s) found", true);
        } catch (e) {
          setStatus("Can't reach daemon: " + e.message, false);
        }
      }

      function applyVisibility() {
        document.querySelectorAll("[data-only]").forEach((el) => {
          el.style.display = el.getAttribute("data-only") === actionUUID ? "" : "none";
        });
      }

      function hydrate() {
        $("baseUrl").value = settings.baseUrl || "";
        $("token").value = settings.token || "";
        $("mode").value = settings.mode || "toggle";
        $("color").value = settings.color || "#ffffff";
        $("levelColor").value = settings.level !== undefined ? settings.level : 100;
        $("levelCct").value = settings.level !== undefined ? settings.level : 100;
        $("step").value = settings.step !== undefined ? settings.step : 10;
        $("perTickB").value = settings.perTick !== undefined ? settings.perTick : 4;
        $("perTickC").value = settings.perTick !== undefined ? settings.perTick : 100;
      }

      function bindNumber(id, key) {
        $(id).addEventListener("change", (e) => {
          settings[key] = Number(e.target.value);
          saveSettings();
        });
      }

      function bindText(id, key, reload) {
        $(id).addEventListener("change", (e) => {
          settings[key] = e.target.value.trim();
          saveSettings();
          if (reload) loadLights();
        });
      }

      function wireInputs() {
        $("light").addEventListener("change", (e) => {
          settings.lightId = e.target.value;
          saveSettings();
        });
        $("refresh").addEventListener("click", loadLights);
        bindText("baseUrl", "baseUrl", true);
        bindText("token", "token", true);
        bindText("mode", "mode", false);
        bindText("color", "color", false);
        bindNumber("levelColor", "level");
        bindNumber("levelCct", "level");
        bindNumber("step", "step");
        bindNumber("perTickB", "perTick");
        bindNumber("perTickC", "perTick");
      }

      // Stream Deck entry point.
      function connectElgatoStreamDeckSocket(inPort, inUUID, inRegisterEvent, inInfo, inActionInfo) {
        uuid = inUUID;
        const actionInfo = JSON.parse(inActionInfo);
        actionUUID = actionInfo.action;
        settings = (actionInfo.payload && actionInfo.payload.settings) || {};

        websocket = new WebSocket("ws://127.0.0.1:" + inPort);
        websocket.onopen = () => {
          websocket.send(JSON.stringify({ event: inRegisterEvent, uuid: inUUID }));
          applyVisibility();
          hydrate();
          wireInputs();
          loadLights();
        };
      }

      window.connectElgatoStreamDeckSocket = connectElgatoStreamDeckSocket;
    </script>
  </body>
</html>
